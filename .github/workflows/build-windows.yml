on:
  push: {}
  pull_request: {}
  workflow_dispatch: {}

name: Build Windows

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name != 'main' && github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Using PowerShell so that we do not need to install WSL components.
      # WSLv1 is only installed on GitHub runners.
      - name: Install zig
        shell: pwsh
        run: |
          # Get the zig version from build.zig.zon so it only needs to be updated there
          $fileContent = Get-Content -Path "build.zig.zon" -Raw
          $pattern = 'minimum_zig_version\s*=\s*"([^"]+)"'
          $zigVersion = [regex]::Match($fileContent, $pattern).Groups[1].Value
          if (-not $zigVersion) {
            Write-Error "Could not find minimum_zig_version in build.zig.zon"
            exit 1
          }
          $zigDistributionName = "zig-x86_64-windows-$zigVersion"
          Write-Output "Installing $zigDistributionName"
          $uri = "https://ziglang.org/download/$zigVersion/$zigDistributionName.zip"
          Invoke-WebRequest -Uri "$uri" -OutFile ".\zig-windows.zip"
          Expand-Archive -Path ".\zig-windows.zip" -DestinationPath ".\" -Force
          Remove-Item -Path ".\zig-windows.zip"
          Rename-Item -Path ".\$zigDistributionName" -NewName ".\zig"
          Write-Host "Zig installed."
          .\zig\zig.exe version

      # The Zig cache occasionally ends up in a bad state on Windows which can
      # surface as configure-phase read errors. Start from a clean cache for
      # each job to keep builds reliable.
      - name: Clean zig cache
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force ".\.zig-cache" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force ".\zig-out" -ErrorAction SilentlyContinue

      # Windows support is best-effort; continue-on-error keeps the workflow
      # running so that logs are always captured and uploaded.
      - name: Test Windows
        shell: pwsh
        run: |
          .\zig\zig.exe build test 2>&1 | Out-File -FilePath "test.log"
        continue-on-error: true

      - name: Build Windows
        shell: pwsh
        run: |
          .\zig\zig.exe build 2>&1 | Out-File -FilePath "build.log"
        continue-on-error: true

      - name: Dump logs
        if: always()
        shell: pwsh
        run: |
          foreach ($logFile in @("test.log", "build.log")) {
            if (Test-Path ".\$logFile") {
              Write-Host "=== $logFile ==="
              Get-Content -Path ".\$logFile"
            }
          }

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: windows-build-logs
          path: |
            test.log
            build.log
          if-no-files-found: ignore

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: windows-build-artifacts
          path: zig-out/**
          if-no-files-found: ignore
